name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            plugins/*/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install plugin dependencies
        run: npm run plugins:install

      - name: Type-check gateway
        run: npm run check

      - name: Build gateway
        run: npm run build

      - name: Run CLI tests
        run: npm run test:cli

      - name: Type-check plugins
        run: npm run plugins:check

      - name: Build plugins
        run: npm run plugins:build
